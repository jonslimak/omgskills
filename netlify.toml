[build]
  publish = "site"

[[edge_functions]]
  path = "/health/*"
  function = "health-basic-auth"

[[edge_functions]]
  path = "/data/health.json"
  function = "health-basic-auth"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/updates/*"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/data/health.json"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/data/index.html"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/data/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"
